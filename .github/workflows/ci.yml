name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.json') }}

      - name: Install
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP-CS-Fixer
        run: composer cs

      - name: PHPStan
        run: composer stan

      - name: PHPUnit
        run: composer test
